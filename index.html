<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blinkit Clone</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <i class="fa-solid fa-basket-shopping"></i>
        Blinkit
    </div>

    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search groceries...">
    </div>

    <button class="cart-btn">
        <i class="fa-solid fa-cart-shopping"></i>
        Cart
    </button>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Groceries delivered in 10 minutes</h1>
        <p>Fresh fruits, vegetables, snacks and daily essentials.</p>
        <button>Order Now</button>
    </div>
</section>

<section class="categories">

    <div class="card">
        <i class="fa-solid fa-apple-whole"></i>
        <h3>Fruits</h3>
    </div>

    <div class="card">
        <i class="fa-solid fa-cheese"></i>
        <h3>Dairy</h3>
    </div>

    <div class="card">
        <i class="fa-solid fa-bottle-water"></i>
        <h3>Drinks</h3>
    </div>

    <div class="card">
        <i class="fa-solid fa-basket-shopping"></i>
        <h3>Groceries</h3>
    </div>

</section>

<section class="offer">
    <i class="fa-solid fa-tags"></i>
    <h2 id="offerText">50% OFF on First Order</h2>
</section>

<script src="script.js"></script>
</body>
</html>
